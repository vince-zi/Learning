<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Socratica · Cognitive Core Preview</title>
<style>
  html, body{
    margin:0; padding:0; width:100%; height:100%;
    background:#0d0b18; overflow:hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  #scene-canvas{ position:fixed; inset:0; display:block; z-index:0; }

  .text-layer{
    position:relative; z-index:10;
    width:100%; height:100%;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding: 0 24px;
    pointer-events:none;
    color:#f3f0fa;
  }
  .eyebrow{
    font-size:12px; letter-spacing:0.3em; text-transform:uppercase;
    color:#ff8fb5; opacity:0.85; margin-bottom:14px;
  }
  .title{
    font-size: clamp(28px, 7vw, 46px);
    font-weight:600; line-height:1.25; margin:0 0 14px;
    background: linear-gradient(135deg,#ffffff,#cdb9ff 55%,#ff9ec4);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .subtitle{
    font-size:14px; color:#a9a2c6; max-width:320px; line-height:1.7; margin:0 0 26px;
  }
  .cta{
    pointer-events:auto;
    font-size:13px; padding:11px 26px; border-radius:999px;
    border:1px solid rgba(255,255,255,0.18);
    background: rgba(255,255,255,0.06);
    color:#f3f0fa; letter-spacing:0.04em; cursor:pointer;
    backdrop-filter: blur(6px);
    transition: background 0.25s ease, transform 0.2s ease;
  }
  .cta:hover{ background: rgba(255,255,255,0.12); transform: translateY(-1px); }

  .fps{
    position:fixed; left:14px; bottom:14px; z-index:10;
    font-size:11px; color:#665e85; letter-spacing:0.05em;
    pointer-events:none;
  }
</style>
</head>
<body>

<canvas id="scene-canvas"></canvas>

<div class="text-layer">
  <div class="eyebrow">Socratica · MindWeave</div>
  <h1 class="title">认知的核心<br/>在流动中生长</h1>
  <p class="subtitle">不是教你背单词，而是和你一起，把语言重新组合成思维。</p>
  <button class="cta">开始苏格拉底式对话</button>
</div>

<div class="fps" id="fpsCounter"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  var canvas = document.getElementById('scene-canvas');
  var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: false, alpha: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.5));
  renderer.setSize(window.innerWidth, window.innerHeight);

  var scene = new THREE.Scene();
  var camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 0, 5);

  /* ───────────────────── 1. 全屏流体底色 (hash noise 5层 + vignette + auto mouse) ───────────────────── */
  var fluidUniforms = {
    uTime:   { value: 0 },
    uBreath: { value: 0 },
    uMouse:  { value: new THREE.Vector2(0.5, 0.5) },
  };

  var fluidMaterial = new THREE.ShaderMaterial({
    uniforms: fluidUniforms,
    depthWrite: false,
    vertexShader: [
      'varying vec2 vUv;',
      'void main() {',
      '  vUv = uv;',
      '  gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);',
      '}'
    ].join('\n'),
    fragmentShader: [
      'precision highp float;',
      'uniform float uTime;',
      'uniform float uBreath;',
      'uniform vec2 uMouse;',
      'varying vec2 vUv;',

      'float hash(vec2 p) {',
      '  p = fract(p * vec2(123.34, 456.21));',
      '  p += dot(p, p + 45.32);',
      '  return fract(p.x * p.y);',
      '}',
      'float noise(vec2 p) {',
      '  vec2 i = floor(p);',
      '  vec2 f = fract(p);',
      '  float a = hash(i);',
      '  float b = hash(i + vec2(1.0, 0.0));',
      '  float c = hash(i + vec2(0.0, 1.0));',
      '  float d = hash(i + vec2(1.0, 1.0));',
      '  vec2 u = f * f * (3.0 - 2.0 * f);',
      '  return mix(a, b, u.x) + (c - a) * u.y * (1.0 - u.x) + (d - b) * u.x * u.y;',
      '}',
      'float fbm(vec2 p) {',
      '  float v = 0.0;',
      '  float amp = 0.5;',
      '  for (int i = 0; i < 5; i++) {',
      '    v += amp * noise(p);',
      '    p *= 2.05;',
      '    amp *= 0.55;',
      '  }',
      '  return v;',
      '}',

      'void main() {',
      '  vec2 uv = vUv * 2.0 - 1.0;',
      '  float slow = uTime * 0.06;',
      '  vec2 driftA = vec2(slow * 0.6, slow * 0.4);',
      '  vec2 driftB = vec2(-slow * 0.5, slow * 0.7);',
      '  vec2 mouseDrift = (uMouse - 0.5) * 0.15;',

      '  float n1 = fbm(uv * 1.6 + driftA + mouseDrift);',
      '  float n2 = fbm(uv * 2.4 - driftB + 4.2);',
      '  float n3 = fbm(uv * 1.1 + vec2(n1, n2) * 0.8 + uBreath * 0.3);',

      '  vec3 color0 = vec3(0.051, 0.043, 0.094);',
      '  vec3 color1 = vec3(0.106, 0.067, 0.227);',
      '  vec3 color2 = vec3(0.020, 0.149, 0.125);',
      '  vec3 color3 = vec3(1.000, 0.369, 0.592);',

      '  vec3 col = mix(color0, color1, smoothstep(0.2, 0.8, n1));',
      '  col = mix(col, color2, smoothstep(0.35, 0.85, n2));',
      '  float pinkMask = smoothstep(0.55, 0.95, n3) * (0.35 + uBreath * 0.25);',
      '  col = mix(col, color3, pinkMask * 0.5);',

      '  float vignette = smoothstep(1.15, 0.2, length(vUv - 0.5) * 1.4);',
      '  col *= 0.55 + vignette * 0.5;',

      '  gl_FragColor = vec4(col, 1.0);',
      '}'
    ].join('\n')
  });

  var bgPlaneZ = -4;
  var fluidMesh = new THREE.Mesh(new THREE.PlaneGeometry(1, 1), fluidMaterial);
  fluidMesh.position.z = bgPlaneZ;
  scene.add(fluidMesh);

  function fitBackgroundToViewport(){
    var dist = camera.position.z - bgPlaneZ;
    var vFov = camera.fov * Math.PI / 180;
    var height = 2 * Math.tan(vFov / 2) * dist;
    var width = height * camera.aspect;
    fluidMesh.scale.set(width * 1.15, height * 1.15, 1);
  }

  /* ───────────────────── 2. 粒子浮动云团 (spherical shell + normal breathing + random wandering) ───────────────────── */
  var COUNT = 2200;
  var RADIUS = 2.6;

  var positions = new Float32Array(COUNT * 3);
  var randoms = new Float32Array(COUNT * 3);
  var phases = new Float32Array(COUNT);

  for (var i = 0; i < COUNT; i++) {
    var r = RADIUS * (0.55 + Math.random() * 0.6);
    var theta = Math.random() * Math.PI * 2;
    var phi = Math.acos(2 * Math.random() - 1);

    positions[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta) * 0.7;
    positions[i*3+2] = r * Math.cos(phi) * 0.8 - 0.4;

    randoms[i*3]   = (Math.random() - 0.5) * 2;
    randoms[i*3+1] = (Math.random() - 0.5) * 2;
    randoms[i*3+2] = (Math.random() - 0.5) * 2;

    phases[i] = Math.random() * Math.PI * 2;
  }

  var particleGeometry = new THREE.BufferGeometry();
  particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  particleGeometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 3));
  particleGeometry.setAttribute('aPhase', new THREE.BufferAttribute(phases, 1));

  var particleUniforms = {
    uTime:   { value: 0 },
    uBreath: { value: 0 },
    uSize:   { value: 26 },
    uColorA: { value: new THREE.Color('#7dd3fc') },
    uColorB: { value: new THREE.Color('#ff5e97') },
  };

  var particleMaterial = new THREE.ShaderMaterial({
    uniforms: particleUniforms,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    vertexShader: [
      'uniform float uTime;',
      'uniform float uBreath;',
      'uniform float uSize;',
      'attribute vec3 aRandom;',
      'attribute float aPhase;',
      'varying float vPhase;',

      'void main() {',
      '  vPhase = aPhase;',
      '  vec3 p = position;',

      '  p += aRandom * sin(uTime * 0.6 + aPhase) * 0.12;',

      '  float breathing = sin(uTime * 1.4 + aPhase) * 0.18;',
      '  p += normalize(position + 0.0001) * breathing;',

      '  vec4 mvPosition = modelViewMatrix * vec4(p, 1.0);',
      '  gl_Position = projectionMatrix * mvPosition;',

      '  float sizeBreath = 1.0 + breathing * 0.6;',
      '  gl_PointSize = (uSize / -mvPosition.z) * sizeBreath;',
      '}'
    ].join('\n'),
    fragmentShader: [
      'uniform vec3 uColorA;',
      'uniform vec3 uColorB;',
      'varying float vPhase;',

      'void main() {',
      '  float d = length(gl_PointCoord - 0.5);',
      '  if (d > 0.5) discard;',
      '  float alpha = smoothstep(0.5, 0.0, d);',
      '  vec3 col = mix(uColorA, uColorB, 0.5 + 0.5 * sin(vPhase));',
      '  gl_FragColor = vec4(col, alpha * 0.85);',
      '}'
    ].join('\n')
  });

  var particleGroup = new THREE.Group();
  var particles = new THREE.Points(particleGeometry, particleMaterial);
  particleGroup.add(particles);
  scene.add(particleGroup);

  /* ───────────────────── resize ───────────────────── */
  function onResize(){
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    fitBackgroundToViewport();
  }
  window.addEventListener('resize', onResize);
  fitBackgroundToViewport();

  /* ───────────────────── animate (performance.now 替代 Clock) ───────────────────── */
  var fpsEl = document.getElementById('fpsCounter');
  var frames = 0, fpsTimer = 0;
  var startTime = performance.now();

  function animate(){
    requestAnimationFrame(animate);
    var t = (performance.now() - startTime) / 1000;
    var dt = t - fpsTimer;

    var breathe = Math.sin(t * 0.5) * 0.5 + 0.5;

    // Fluid
    fluidUniforms.uTime.value = t;
    fluidUniforms.uBreath.value = breathe;
    fluidUniforms.uMouse.value.x = 0.5 + Math.cos(t * 0.12) * 0.08;
    fluidUniforms.uMouse.value.y = 0.5 + Math.sin(t * 0.10) * 0.08;

    // Particles
    particleUniforms.uTime.value = t;
    particleUniforms.uBreath.value = breathe;
    particleGroup.rotation.y = Math.sin(t * 0.08) * 0.25 + t * 0.015;
    particleGroup.rotation.x = Math.cos(t * 0.06) * 0.06;
    particleGroup.position.z = Math.sin(t * 0.35) * 0.25;

    renderer.render(scene, camera);

    frames++; fpsTimer += dt;
    if (fpsTimer >= 1){
      fpsEl.textContent = frames + ' fps · ' + COUNT + ' particles';
      frames = 0; fpsTimer = 0;
    }
  }
  animate();
})();
</script>
</body>
</html>
